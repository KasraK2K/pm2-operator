services:
  postgres:
    image: postgres:16-alpine
    container_name: pm2-operator-postgres
    environment:
      POSTGRES_DB: pm2_log_viewer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pm2_log_viewer"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pm2-operator-app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/pm2_log_viewer?schema=public}
      APP_PORT: ${APP_PORT:-3000}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      LOG_BUFFER_MAX_LINES: ${LOG_BUFFER_MAX_LINES:-2000}
    ports:
      - "3000:3000"
    command: sh -c "npm run prisma:deploy --workspace @pm2-operator/server && npm run start --workspace @pm2-operator/server"

volumes:
  postgres_data:
